<div class="layout-wrapper">

  <mat-toolbar class="hauptmenu" color="primary">
    <button mat-icon-button (click)="zurueck()" matTooltip="Hauptmenu">
      <mat-icon>arrow_back</mat-icon>
    </button>

    @for (item of menu; track item.route) {
      <button mat-button
              class="menu-btn"
              [class.aktiv]="isActive(item)"
              (click)="navigateTo(item)">
        <mat-icon>{{ item.icon }}</mat-icon>
        {{ item.label }}
      </button>
    }

    <span class="spacer"></span>
    <mat-icon>shield</mat-icon>
    <span class="verein-name">{{ vereinName }}</span>
  </mat-toolbar>

  <div class="inhalt">
    <router-outlet></router-outlet>
  </div>

</div>
