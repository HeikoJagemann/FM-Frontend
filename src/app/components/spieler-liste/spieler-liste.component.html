<div class="container">
  <h2>Mannschaft</h2>

  @if (loading) {
    <div class="spinner-wrapper"><mat-spinner></mat-spinner></div>
  } @else {
    <mat-tab-group animationDuration="150ms">

      <mat-tab label="Profi">
        <div class="tab-inhalt">
          <app-kader-tabelle
            [spieler]="profi"
            (detailClick)="detail($event)"
            (loeschenClick)="loeschen($event)">
          </app-kader-tabelle>
        </div>
      </mat-tab>

      <mat-tab label="Amateur">
        <div class="tab-inhalt">
          <app-kader-tabelle
            [spieler]="amateur"
            (detailClick)="detail($event)"
            (loeschenClick)="loeschen($event)">
          </app-kader-tabelle>
        </div>
      </mat-tab>

    </mat-tab-group>
  }
</div>
