<div class="container">
  <div class="aktionsleiste">
    <h2>Mannschaft</h2>
    <button mat-raised-button color="primary" (click)="generieren()">
      <mat-icon>add</mat-icon> Spieler generieren
    </button>
  </div>

  @if (loading) {
    <div class="spinner-wrapper">
      <mat-spinner></mat-spinner>
    </div>
  } @else {
    <table mat-table [dataSource]="spieler" class="spieler-tabelle mat-elevation-z4">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let s">{{ s.name }}</td>
      </ng-container>

      <ng-container matColumnDef="alter">
        <th mat-header-cell *matHeaderCellDef>Alter</th>
        <td mat-cell *matCellDef="let s">{{ s.alter }}</td>
      </ng-container>

      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef>Position</th>
        <td mat-cell *matCellDef="let s">
          <mat-chip>{{ s.position }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="kader">
        <th mat-header-cell *matHeaderCellDef>Kader</th>
        <td mat-cell *matCellDef="let s">{{ s.kader }}</td>
      </ng-container>

      <ng-container matColumnDef="staerke">
        <th mat-header-cell *matHeaderCellDef>Stärke</th>
        <td mat-cell *matCellDef="let s">
          <span class="staerke" [class.hoch]="s.staerke >= 80" [class.mittel]="s.staerke >= 60 && s.staerke < 80">
            {{ s.staerke }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="wert">
        <th mat-header-cell *matHeaderCellDef>Marktwert</th>
        <td mat-cell *matCellDef="let s">{{ wertFormatiert(s.wert) }}</td>
      </ng-container>

      <ng-container matColumnDef="aktionen">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" matTooltip="Details" (click)="detail(s)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Löschen" (click)="loeschen(s, $event)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="spieler-row" (click)="detail(row)"></tr>
    </table>

    @if (spieler.length === 0) {
      <div class="leer-hinweis">
        <mat-icon>group_off</mat-icon>
        <p>Keine Spieler vorhanden. Klicke auf "Spieler generieren".</p>
      </div>
    }
  }
</div>
