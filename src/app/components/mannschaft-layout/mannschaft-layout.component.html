<nav mat-tab-nav-bar [tabPanel]="tabPanel" class="submenu">
  @for (tab of tabs; track tab.route) {
    <a mat-tab-link
       [active]="router.url.includes('/' + tab.route)"
       (click)="navigateTo(tabs.indexOf(tab))">
      {{ tab.label }}
    </a>
  }
</nav>
<mat-tab-nav-panel #tabPanel>
  <router-outlet></router-outlet>
</mat-tab-nav-panel>
