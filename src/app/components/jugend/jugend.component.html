<div class="container">
  <div class="aktionsleiste">
    <h2>Jugend</h2>
  </div>

  @if (loading) {
    <div class="spinner-wrapper"><mat-spinner></mat-spinner></div>
  } @else {
    <mat-tab-group animationDuration="150ms">

      <mat-tab label="Jugend A">
        <div class="tab-inhalt">
          <app-kader-tabelle
            [spieler]="jugendA"
            (detailClick)="detail($event)">
          </app-kader-tabelle>
        </div>
      </mat-tab>

      <mat-tab label="Jugend B">
        <div class="tab-inhalt">
          <app-kader-tabelle
            [spieler]="jugendB"
            (detailClick)="detail($event)">
          </app-kader-tabelle>
        </div>
      </mat-tab>

      <mat-tab label="Jugend C">
        <div class="tab-inhalt">
          <app-kader-tabelle
            [spieler]="jugendC"
            (detailClick)="detail($event)">
          </app-kader-tabelle>
        </div>
      </mat-tab>

    </mat-tab-group>
  }
</div>
